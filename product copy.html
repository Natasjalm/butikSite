<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FashionFix</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="layout.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

</head>

<body>
    <header>
        <div class="logo">
            <a href="index.html">
                <img src="logo.webp" alt="Logo">
            </a>
        </div>
    </header>
    <main>
        <div class="product_info_card">
            <div class="info-img"><img src="https://kea-alt-del.dk/t7/images/webp/640/1528.webp" alt="img"></div>
            <div class="info">
                <h1 class="lille-h1">Product Information</h1>
                <h3>Model name</h3>
                <p>"Black Fleece Jacket"</p>
                <h3>Gender</h3>
                <p>Men</p>
                <h3>Uasage type</h3>
                <p>Sports</p>
                <h3>Price</h3>
                <p>3999kr</p>
                <button>Add to basket</button>

            </div>
        </div>

    </main>
</body>

</html>
