<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FashionFix</title>
    <link rel="stylesheet" href="style.css">

<body>

            <article class="card">

                <p>Pris: 1299kr</p>

            <article class="card">
                <img src="https://kea-alt-del.dk/t7/images/webp/640/1525.webp" alt="img">

                <p>Pris: 1299kr</p>

            <article class="card">
                <img src="https://kea-alt-del.dk/t7/images/webp/640/1528.webp" alt="img">
                <h3 class="product-info">"Black Fleece Jacket"</h3>
                <p class="price">Pris: 3999kr</p>
                <p class="brand">Brand name: "Puma"</p>
                <a class="cta" href="product.html">See details</a>

</html>
